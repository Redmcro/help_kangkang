<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐷 康康逆天改命</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a16;--card:rgba(22,22,48,.88);--pink:#ff6b9d;--purple:#c471ed;--blue:#5b86e5;--green:#4ade80;--yellow:#fbbf24;--red:#ef4444;--orange:#f97316;--cyan:#22d3ee;--text:#eee;--text2:#aaa;--text3:#666;--border:rgba(255,255,255,.08);--radius:16px}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(100,60,180,.12) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(90,130,230,.08) 0%,transparent 50%);z-index:0}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:tw var(--d) ease-in-out infinite alternate}
@keyframes tw{0%{opacity:.15;transform:scale(1)}100%{opacity:.9;transform:scale(1.5)}}
.screen{display:none;position:relative;z-index:1;min-height:100vh;padding:16px}
.screen.active{display:block}
.container{max-width:600px;margin:0 auto}

/* START */
.logo{text-align:center;padding:50px 0 24px}
.logo h1{font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.logo .sub{color:var(--text2);font-size:13px;line-height:1.6}
.logo .sub em{color:var(--orange);font-style:normal}
.buff-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;backdrop-filter:blur(10px)}
.buff-section h3{font-size:13px;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.buff-section h3 .coins{color:var(--yellow);font-weight:900;font-size:16px}
.buff-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.buff-card{padding:10px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .25s;background:rgba(255,255,255,.02);text-align:center}
.buff-card:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.05)}
.buff-card.active{border-color:var(--purple);box-shadow:0 0 16px rgba(196,113,237,.2)}
.buff-card.locked{opacity:.35;cursor:not-allowed}
.buff-card .bf-icon{font-size:24px}
.buff-card .bf-name{font-size:12px;font-weight:700;margin:4px 0 2px}
.buff-card .bf-desc{font-size:10px;color:var(--text3)}
.buff-card .bf-cost{font-size:10px;color:var(--yellow);margin-top:2px}
.start-btn{display:block;width:100%;padding:16px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-family:inherit;font-size:18px;font-weight:900;cursor:pointer;transition:all .3s;letter-spacing:2px;margin-top:16px}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(196,113,237,.5)}
.best-record{text-align:center;margin-top:12px;font-size:12px;color:var(--text3)}

/* GAME */
.game-top{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin-bottom:12px}
.gt-age{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gt-label{font-size:10px;color:var(--text3)}
.gt-money{font-size:20px;font-weight:900;color:var(--green)}
.gt-stage{font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid var(--border)}
.stats-bar{display:flex;gap:8px;margin-bottom:12px}
.sb-item{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px;text-align:center}
.sb-item .si-icon{font-size:14px}
.sb-item .si-val{font-size:14px;font-weight:900}
.sb-item .si-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:3px;overflow:hidden}
.sb-item .si-fill{height:100%;border-radius:2px;transition:width .5s}
.si-hp .si-val{color:var(--red)}.si-hp .si-fill{background:var(--red)}
.si-int .si-val{color:var(--blue)}.si-int .si-fill{background:var(--blue)}
.si-hap .si-val{color:var(--yellow)}.si-hap .si-fill{background:var(--yellow)}
.si-chr .si-val{color:var(--pink)}.si-fill{background:var(--pink)}

/* Event stream */
.event-stream{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-height:300px;max-height:55vh;overflow-y:auto;margin-bottom:12px}
.event-stream::-webkit-scrollbar{width:4px}
.event-stream::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.ev-line{padding:6px 10px;margin-bottom:4px;border-radius:8px;font-size:13px;color:var(--text2);border-left:3px solid var(--text3);animation:evIn .4s ease-out;line-height:1.5}
.ev-line.good{border-left-color:var(--green);color:var(--green)}
.ev-line.bad{border-left-color:var(--red);color:#f87171}
.ev-line.special{border-left-color:var(--purple);color:var(--purple)}
.ev-line.money{border-left-color:var(--yellow);color:var(--yellow)}
.ev-line.choice-made{border-left-color:var(--cyan);color:var(--cyan)}
.ev-line .ev-age{color:var(--text3);margin-right:6px;font-weight:700;font-size:12px}
@keyframes evIn{0%{opacity:0;transform:translateX(-8px)}100%{opacity:1;transform:translateX(0)}}

/* Choice panel */
.choice-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;display:none;animation:cardIn .4s ease-out}
.choice-panel.show{display:block}
@keyframes cardIn{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
.cp-title{font-size:15px;font-weight:700;margin-bottom:4px;text-align:center}
.cp-desc{font-size:12px;color:var(--text2);margin-bottom:14px;text-align:center}
.cp-btn{display:block;width:100%;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.03);color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;transition:all .25s;text-align:left;min-height:48px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.cp-btn:last-child{margin-bottom:0}
.cp-btn:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.07);transform:translateX(4px)}
.cp-btn:active{transform:scale(.98);background:rgba(255,255,255,.1)}
.cp-btn.locked{opacity:.35;cursor:not-allowed}
.cp-btn .cpb-hint{font-size:10px;color:var(--text3);margin-top:2px}
.cp-btn .cpb-lock{font-size:10px;color:var(--orange);margin-top:2px}
.speed-ctrl{text-align:center;margin-bottom:12px}
.speed-ctrl button{padding:6px 14px;margin:0 4px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.03);color:var(--text2);font-family:inherit;font-size:11px;cursor:pointer;transition:all .2s}
.speed-ctrl button.active{border-color:var(--purple);color:var(--purple);background:rgba(196,113,237,.1)}

/* END */
.end-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.end-card{text-align:center;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 28px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:popIn .6s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{0%{opacity:0;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}
.end-card .big-icon{font-size:72px;margin-bottom:12px}
.end-card h2{font-size:24px;font-weight:900;margin-bottom:6px}
.end-card h2.win{background:linear-gradient(135deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.end-card h2.lose{color:var(--red)}
.end-card .end-desc{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.end-card .end-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.end-card .eg-item{background:rgba(255,255,255,.04);border-radius:8px;padding:8px}
.end-card .eg-item .eg-l{font-size:10px;color:var(--text3)}
.end-card .eg-item .eg-v{font-size:16px;font-weight:900}
.end-card .legacy-earned{font-size:14px;color:var(--yellow);font-weight:700;margin-bottom:16px}
.end-card .restart-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;min-height:48px}
.end-card .restart-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(196,113,237,.4)}

@media(max-width:600px){
  .screen{padding:10px}
  .logo h1{font-size:24px}
  .buff-grid{grid-template-columns:1fr 1fr}
  .stats-bar{flex-wrap:wrap}
  .sb-item{min-width:calc(50% - 4px)}
  .event-stream{max-height:45vh;min-height:200px}
  .start-btn{position:sticky;bottom:10px;box-shadow:0 -4px 20px rgba(0,0,0,.6)}
  .end-card{padding:28px 20px}
  .end-card .end-grid{grid-template-columns:1fr 1fr}
}
@supports(padding:env(safe-area-inset-bottom)){
  .screen{padding-bottom:calc(10px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- START -->
<div class="screen active" id="startScreen"><div class="container">
  <div class="logo">
    <h1>🐷 康康逆天改命</h1>
    <div class="sub">康康是一名Unity游戏程序员<br>但命运的尽头是<em>被AI取代，沦为外卖骑手</em><br>帮助康康改变命运！</div>
  </div>
  <div class="buff-section">
    <h3>🪙 转世加持 <span class="coins" id="legacyCoins">0</span></h3>
    <div class="buff-grid" id="buffGrid"></div>
  </div>
  <button class="start-btn" onclick="startGame()">🚀 开始康康的人生</button>
  <div class="best-record" id="bestRecord"></div>
</div></div>

<!-- GAME -->
<div class="screen" id="gameScreen"><div class="container">
  <div class="game-top">
    <div><div class="gt-stage" id="gStage">👒 婴幼儿</div></div>
    <div style="text-align:center"><div class="gt-age" id="gAge">0</div><div class="gt-label">岁</div></div>
    <div style="text-align:right"><div class="gt-money" id="gMoney">¥0</div><div class="gt-label">存款</div></div>
  </div>
  <div class="stats-bar">
    <div class="sb-item si-hp"><div class="si-icon">❤️</div><div class="si-val" id="vHp">50</div><div class="si-bar"><div class="si-fill" id="bHp" style="width:50%"></div></div></div>
    <div class="sb-item si-int"><div class="si-icon">🧠</div><div class="si-val" id="vInt">50</div><div class="si-bar"><div class="si-fill" id="bInt" style="width:50%"></div></div></div>
    <div class="sb-item si-hap"><div class="si-icon">😊</div><div class="si-val" id="vHap">50</div><div class="si-bar"><div class="si-fill" id="bHap" style="width:50%"></div></div></div>
    <div class="sb-item si-chr"><div class="si-icon">✨</div><div class="si-val" id="vChr">50</div><div class="si-bar"><div class="si-fill" id="bChr" style="width:50%"></div></div></div>
  </div>
  <div class="speed-ctrl">
    <button onclick="setSpeed(1500)" id="sp1">慢速</button>
    <button onclick="setSpeed(800)" class="active" id="sp2">正常</button>
    <button onclick="setSpeed(300)" id="sp3">快速</button>
  </div>
  <div class="event-stream" id="eventStream"></div>
  <div class="choice-panel" id="choicePanel">
    <div class="cp-title" id="cpTitle"></div>
    <div class="cp-desc" id="cpDesc"></div>
    <div id="cpBtns"></div>
  </div>
</div></div>

<!-- END -->
<div class="screen" id="endScreen"><div class="end-screen">
  <div class="end-card">
    <div class="big-icon" id="endIcon">💀</div>
    <h2 id="endTitle" class="lose">康康的人生结束了</h2>
    <div class="end-desc" id="endDesc"></div>
    <div class="end-grid" id="endGrid"></div>
    <div class="legacy-earned" id="endLegacy"></div>
    <button class="restart-btn" onclick="backToStart()">🔄 转世重来</button>
  </div>
</div></div>

<script>
// ===== SAVE =====
const loadL=()=>{const d=localStorage.getItem('kk2');return d?JSON.parse(d):{coins:0,best:0,runs:0,wins:0}};
const saveL=l=>localStorage.setItem('kk2',JSON.stringify(l));
let L=loadL();

// ===== BUFFS =====
const BUFFS=[
  {id:'school',icon:'🎓',name:'重点小学',desc:'智力+10',cost:0,apply:g=>{g.int+=10}},
  {id:'health',icon:'💪',name:'强壮体质',desc:'健康+15',cost:20,apply:g=>{g.hp+=15}},
  {id:'charm',icon:'🌟',name:'颜值逆袭',desc:'魅力+15',cost:20,apply:g=>{g.chr+=15}},
  {id:'rich',icon:'💰',name:'小金库',desc:'初始¥500',cost:30,apply:g=>{g.money+=500}},
  {id:'genius',icon:'🧠',name:'天才大脑',desc:'智力+25',cost:50,apply:g=>{g.int+=25}},
  {id:'lucky',icon:'🍀',name:'欧皇附体',desc:'运气+30',cost:40,apply:g=>{g.luck+=30}},
];
let selBuffs=new Set(['school']);

// ===== GAME STATE =====
let G,autoTimer,speed=800,usedEvents=new Set(),paused=false;

const STAGES=[
  {max:3,name:'👶 婴幼儿'},{max:6,name:'🧒 幼儿园'},{max:12,name:'📚 小学'},{max:15,name:'📖 初中'},
  {max:18,name:'🎓 高中'},{max:22,name:'🎮 大学'},{max:30,name:'💻 程序员'},{max:40,name:'🏢 职场'},
  {max:55,name:'🔄 转型期'},{max:70,name:'🧓 中老年'},{max:100,name:'👴 老年'}
];

const getStage=a=>(STAGES.find(s=>a<=s.max)||STAGES[STAGES.length-1]).name;

// ===== HELPERS =====
const clamp=(v,a=0,b=100)=>Math.max(a,Math.min(b,v));
const rng=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const chance=p=>Math.random()*100<p;
const earnM=(base)=>{let m=1;if(G.age>=16)m=1.5;if(G.age>=23)m=3;if(G.age>=30)m=5;if(G.age>=40)m=6;if(G.age>=50)m=4;const a=Math.floor(base*m*(1+G.int/200));G.money+=a;G.earned+=a;return a};

// ===== STARS =====
(()=>{const c=document.getElementById('stars');for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.setProperty('--d',(2+Math.random()*4)+'s');c.appendChild(s)}})();

// ===== UI =====
function updateUI(){
  document.getElementById('gAge').textContent=G.age;
  document.getElementById('gStage').textContent=getStage(G.age);
  document.getElementById('gMoney').textContent='¥'+Math.floor(G.money);
  document.getElementById('vHp').textContent=Math.round(G.hp);
  document.getElementById('vInt').textContent=Math.round(G.int);
  document.getElementById('vHap').textContent=Math.round(G.hap);
  document.getElementById('vChr').textContent=Math.round(G.chr);
  document.getElementById('bHp').style.width=G.hp+'%';
  document.getElementById('bInt').style.width=G.int+'%';
  document.getElementById('bHap').style.width=G.hap+'%';
  document.getElementById('bChr').style.width=G.chr+'%';
}

function addEv(text,type='neutral'){
  const s=document.getElementById('eventStream');
  const d=document.createElement('div');
  d.className='ev-line '+type;
  d.innerHTML=`<span class="ev-age">[${G.age}岁]</span>${text}`;
  s.appendChild(d);
  s.scrollTop=s.scrollHeight;
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

// ===== EVENT DATABASE =====
// {id,age:[min,max],text,type,effect:{hp,int,hap,chr,money},cond:(G)=>bool,once:true}
// Choice events: {id,age,text,type:'choice',title,desc,choices:[{text,hint,need:{},effect:(G)=>string}]}
const EVENTS=[
// === 婴幼儿 0-3 ===
{id:'birth',age:[0,0],text:'康康出生了！一声啼哭响彻产房。医生说："是个男孩！"',type:'special'},
{id:'cry',age:[0,1],text:'凌晨三点，康康又哭了。爸妈快要精神崩溃。',effect:{hap:-3,hp:2}},
{id:'walk',age:[1,2],text:'康康摇摇晃晃站起来了！走了两步，啪——摔了个狗啃泥。',effect:{hp:-3}},
{id:'alien',age:[1,3],text:'半夜一道光照进房间，康康被外星人绑架了...5分钟后被送回来了，外星人嫌他太吵。',type:'special',effect:{luck:10}},
{id:'cake3',age:[3,3],text:'三岁生日！康康把脸埋进蛋糕里，奶油糊了一脸但笑得很开心。',type:'good',effect:{hap:10}},
{id:'shark',age:[2,3],text:'康康看了鲨鱼的纪录片，晚上做噩梦了。',effect:{hap:-5}},
{id:'draw',age:[2,4],text:'康康在墙上画了一幅"抽象派"作品。妈妈快气疯了，爸爸说是行为艺术。',type:'good',effect:{int:3}},

// === 幼儿园 4-6 ===
{id:'bully',age:[4,6],text:'幼儿园来了个"小霸王"，抢了康康的玩具。康康决定...',type:'choice',title:'🦖 小霸王来了',desc:'小霸王抢了你的变形金刚！',choices:[
  {text:'👊 打回去',hint:'勇气+魅力',effect:g=>{if(chance(50)){g.hp-=5;return'打输了，但赢得了尊重。魅力+5'}g.chr+=8;g.hap+=5;return'把小霸王揍哭了！全班鼓掌！魅力+8'}},
  {text:'🤝 分享玩具',hint:'魅力+10',effect:g=>{g.chr+=10;return'小霸王哭了，说从没人对他这么好。你们成了好朋友'}},
  {text:'👨‍🏫 告老师',hint:'安全',effect:g=>{g.int+=3;return'老师批评了小霸王。但你被贴上了"爱告状"的标签'}},
]},
{id:'candy',age:[4,6],text:'放学路上一个白胡子老头递给康康一颗糖："我看你骨骼惊奇..."康没敢吃就跑了。',type:'good',effect:{int:3}},
{id:'ipad',age:[4,6],text:'康康开始玩爸妈的iPad，第一次接触了电子游戏。眼睛里闪烁着光。',type:'good',effect:{int:5,hap:5}},
{id:'paint',age:[4,6],text:'画画比赛，康康画了个方块人。老师以为是毕加索风格，给了鼓励奖。',effect:{chr:3,hap:3}},

// === 小学 7-12 ===
{id:'game_start',age:[7,9],text:'康康第一次玩到了Minecraft！他被这个方块世界震撼了，疯狂研究红石电路。',type:'special',effect:{int:8,hap:10}},
{id:'exam1',age:[8,12],text:'期末考试。康康因为通宵玩游戏，数学只考了62分。妈妈的拖鞋已经举起来了。',type:'bad',effect:{hp:-5,hap:-8}},
{id:'code1',age:[9,12],text:'康康在B站看到了编程教学视频，用Scratch做了第一个小游戏！',type:'special',effect:{int:10}},
{id:'money1',age:[7,12],text:'过年了！亲戚们给了¥200压岁钱。妈妈说帮你"保管"。',type:'choice',title:'💰 压岁钱保卫战',desc:'妈妈伸出了热情的双手',choices:[
  {text:'🤫 藏到枕头底下',hint:'获得¥200',effect:g=>{g.money+=200;g.earned+=200;return'藏好了！这是你的第一桶金！'}},
  {text:'👩 乖乖交给妈妈',hint:'妈妈笑了',effect:g=>{g.chr+=3;return'妈妈笑了。这笔钱就此消失在宇宙中'}},

// ===== AUTO-PLAY ENGINE =====
function getEventsForAge(age){
  return EVENTS.filter(ev=>{
    if(usedEvents.has(ev.id))return false;
    const [min,max]=ev.age;
    if(age<min||age>max)return false;
    if(ev.cond&&!ev.cond(G))return false;
    return true;
  });
}

function processAge(){
  if(!G.alive)return;
  // Age decay
  if(G.age>=45)G.hp-=rng(1,3);
  if(G.age>=60)G.hp-=rng(2,4);
  if(G.age>=80)G.hp-=rng(3,6);
  G.hp=clamp(G.hp);G.hap=clamp(G.hap);G.int=clamp(G.int);G.chr=clamp(G.chr);
  // Passive income
  if(G.age>=23&&G.salary>0&&G.job!=='失业'){earnM(G.salary*0.2)}
  // Death check
  if(G.hp<=0){endGame(pick(['体力不支','在睡梦中安详离去','心脏骤停']));return}
  if(G.age>100){endGame(null,true);return}
  // Get events
  let pool=getEventsForAge(G.age);
  if(!pool.length){addEv('平平淡淡的一年。');updateUI();G.age++;schedNext();return}
  // Weighted: prefer non-filler, choice events
  let ev=pool.find(e=>e.type==='choice')||pool.find(e=>e.type==='special')||pool.find(e=>e.id&&!e.id.startsWith('f'))||pick(pool);
  // Get text
  let text=typeof ev.text==='function'?ev.text():ev.text;
  if(text===null){G.age++;schedNext();return}// conditional skip
  usedEvents.add(ev.id);
  // Apply effects
  if(ev.effect){
    if(ev.effect.hp)G.hp=clamp(G.hp+ev.effect.hp);
    if(ev.effect.int)G.int=clamp(G.int+ev.effect.int);
    if(ev.effect.hap)G.hap=clamp(G.hap+ev.effect.hap);
    if(ev.effect.chr)G.chr=clamp(G.chr+ev.effect.chr);
    if(ev.effect.money){G.money+=ev.effect.money;G.earned+=ev.effect.money}
    if(ev.effect.luck)G.luck=(G.luck||50)+ev.effect.luck;
  }
  if(ev.run)ev.run(G);
  // Choice event = pause
  if(ev.type==='choice'&&ev.choices){
    addEv(text,'special');
    updateUI();
    showChoice(ev);
    return;// paused until choice made
  }
  addEv(text,ev.type||'neutral');
  updateUI();
  if(G.hp<=0){endGame('身体扛不住了');return}
  G.age++;
  schedNext();
}

function schedNext(){
  if(!G.alive)return;
  autoTimer=setTimeout(processAge,speed);
}

function showChoice(ev){
  paused=true;
  clearTimeout(autoTimer);
  const p=document.getElementById('choicePanel');
  p.classList.add('show');
  document.getElementById('cpTitle').textContent=ev.title||'做出选择';
  document.getElementById('cpDesc').textContent=ev.desc||'';
  const btns=document.getElementById('cpBtns');btns.innerHTML='';
  ev.choices.forEach((ch,i)=>{
    const locked=ch.need&&((ch.need.money&&G.money<ch.need.money)||(ch.need.int&&G.int<ch.need.int));
    const b=document.createElement('button');
    b.className='cp-btn'+(locked?' locked':'');
    b.innerHTML=`<div>${ch.text}</div>${ch.hint?`<div class="cpb-hint">${ch.hint}</div>`:''}${locked?`<div class="cpb-lock">🔒 需要¥${ch.need?.money||0}</div>`:''}`;
    if(!locked)b.onclick=()=>makeChoice(ch);
    btns.appendChild(b);
  });
  // Scroll to choice
  p.scrollIntoView({behavior:'smooth',block:'center'});
}

function makeChoice(ch){
  const result=ch.effect(G);
  G.hp=clamp(G.hp);G.int=clamp(G.int);G.hap=clamp(G.hap);G.chr=clamp(G.chr);
  document.getElementById('choicePanel').classList.remove('show');
  if(result)addEv('→ '+result,'choice-made');
  updateUI();
  paused=false;
  if(G.hp<=0){endGame('身体扛不住了');return}
  G.age++;
  schedNext();
}

function setSpeed(s){
  speed=s;
  document.querySelectorAll('.speed-ctrl button').forEach(b=>b.classList.remove('active'));
  if(s===1500)document.getElementById('sp1').classList.add('active');
  else if(s===800)document.getElementById('sp2').classList.add('active');
  else document.getElementById('sp3').classList.add('active');
}

// ===== END GAME =====
function endGame(cause,isWin=false){
  G.alive=false;clearTimeout(autoTimer);
  const isRider=G.job==='外卖骑手';
  const earned=Math.floor(G.earned/(isWin?80:100));
  L.coins+=earned;L.runs++;if(G.age>L.best)L.best=G.age;if(isWin)L.wins++;saveL(L);
  document.getElementById('endIcon').textContent=isWin?'🎉':isRider?'🛵':'💀';
  const t=document.getElementById('endTitle');
  if(isWin){t.textContent='康康的传奇人生！';t.className='win'}
  else if(isRider){t.textContent='康康沦为了骑手...';t.className='lose'}
  else{t.textContent='康康的人生结束了';t.className='lose'}
  document.getElementById('endDesc').innerHTML=isWin
    ?`活到了${G.age}岁！${G.aiSurvived?'成功抵抗了AI浪潮！':''}总收入¥${Math.floor(G.earned)}`
    :isRider
    ?`康康最终还是被AI取代，成为了外卖骑手...<br>再试一次，帮他逆天改命吧！`
    :`享年${G.age}岁 — ${cause}<br>最终职业：${G.job}`;
  document.getElementById('endGrid').innerHTML=`
    <div class="eg-item"><div class="eg-l">享年</div><div class="eg-v">${G.age}岁</div></div>
    <div class="eg-item"><div class="eg-l">职业</div><div class="eg-v">${G.job}</div></div>
    <div class="eg-item"><div class="eg-l">总收入</div><div class="eg-v" style="color:var(--green)">¥${Math.floor(G.earned)}</div></div>
    <div class="eg-item"><div class="eg-l">改命</div><div class="eg-v">${G.aiSurvived?'✅成功':'❌失败'}</div></div>`;
  document.getElementById('endLegacy').textContent=`获得传世金币: +${earned} 🪙`;
  showScreen('endScreen');
}

// ===== START =====
function renderBuffs(){
  const g=document.getElementById('buffGrid');g.innerHTML='';
  BUFFS.forEach(b=>{
    const locked=b.cost>L.coins&&!selBuffs.has(b.id);
    const active=selBuffs.has(b.id);
    const d=document.createElement('div');
    d.className='buff-card'+(locked?' locked':'')+(active?' active':'');
    d.innerHTML=`<div class="bf-icon">${b.icon}</div><div class="bf-name">${b.name}</div><div class="bf-desc">${b.desc}</div>${b.cost>0?`<div class="bf-cost">🪙${b.cost}</div>`:` <div class="bf-cost" style="color:var(--green)">免费</div>`}`;
    if(!locked)d.onclick=()=>{if(active)selBuffs.delete(b.id);else selBuffs.add(b.id);renderBuffs()};
    g.appendChild(d);
  });
}

function startGame(){
  // Check cost
  let cost=0;selBuffs.forEach(id=>{const b=BUFFS.find(x=>x.id===id);if(b)cost+=b.cost});
  if(cost>L.coins&&cost>0){alert('传世金币不足！');return}
  if(cost>0){L.coins-=cost;saveL(L)}
  G={age:0,hp:55,int:50,hap:60,chr:45,luck:50,money:0,earned:0,alive:true,
    job:'none',salary:0,college:'',highSchool:'',married:false,indieSuccess:false,aiSurvived:false};
  selBuffs.forEach(id=>{const b=BUFFS.find(x=>x.id===id);if(b)b.apply(G)});
  usedEvents=new Set();
  document.getElementById('eventStream').innerHTML='';
  showScreen('gameScreen');
  updateUI();
  addEv('康康的人生开始了...','special');
  schedNext();
}

function backToStart(){L=loadL();showScreen('startScreen');initStart()}

function initStart(){
  document.getElementById('legacyCoins').textContent=L.coins;
  renderBuffs();
  const br=document.getElementById('bestRecord');
  br.textContent=L.runs>0?`已转世${L.runs}次 · 最长${L.best}岁 · 改命成功${L.wins}次`:'第一次投胎？帮康康改变被AI取代的命运！';
}
initStart();

</script>
